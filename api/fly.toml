# CouncilHound API — deploy from the REPO ROOT:
#   flyctl deploy -c api/fly.toml
app = "councilhound-api"
primary_region = "iad"

[build]
  dockerfile = "api/Dockerfile"

[env]
  EMBEDDING_DEVICE = "cpu"
  # set ALLOWED_ORIGINS via `fly secrets` or here once the domain is live

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 40
    hard_limit = 80

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"

[checks]
  [checks.health]
    port = 8000
    type = "http"
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    path = "/health"
