name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ingestion:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:ci@localhost:5432/postgres
    defaults:
      run:
        working-directory: ingestion
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt pytest
      - name: Migrations apply cleanly (and roll back)
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade base
          uv run alembic upgrade head
      - name: Tests
        env:
          PYTHONPATH: src
        run: uv run pytest tests/ -v

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r requirements-dev.txt
      - name: Smoke tests
        run: uv run pytest tests/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # error-tier rules only (undefined names, syntax): red CI means broken
      # code, not style disagreements
      - run: uvx ruff check --select E9,F63,F7,F82 ingestion/src api/app
