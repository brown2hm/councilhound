version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  ingestion:
    build: ./ingestion
    env_file: .env
    environment:
      DATA_DIR: /data
      RAW_DATA_DIR: /data/raw
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data/raw:/data/raw
    # Schema is managed by Alembic: run
    #   docker compose run ingestion python -m councillens.cli init-db
    # then e.g.
    #   docker compose run ingestion python -m councillens.cli ingest --since 2024-07-01
    # No long-running process yet — Phase 1 CLI is invoked manually or via
    # a scheduled job added in Phase 6. Placeholder keeps container idle.
    command: ["tail", "-f", "/dev/null"]

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    env_file: .env
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  pgdata:
